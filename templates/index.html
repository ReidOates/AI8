<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Traffic Sign Recognition</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="hero-card">

        <h1>Traffic Sign Recognition</h1>

        <p class="subtitle">
            Random Forest + HOG Feature Extraction
        </p>

        <div class="accuracy-box">

            Model Accuracy

            <span>{{ accuracy }}</span>

        </div>

        <form
            action="/predict"
            method="POST"
            enctype="multipart/form-data">

            <input
                type="file"
                name="image"
                class="form-control mb-3"
                accept="image/*"
                required>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Analyze Image

            </button>

        </form>

    </div>

</div>

</body>

</html>
